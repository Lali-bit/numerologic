<script>
        function handleDraw() {
            const cardInner = document.getElementById('card-inner');
            const drawBtn = document.getElementById('draw-btn');
            const interpBtn = document.getElementById('interpretation-btn');
            const introText = document.getElementById('intro-text');
            
            if (cardInner.classList.contains('is-flipped')) return;

            // Trigger Flip Animation
            cardInner.classList.add('is-flipped');
            
            // Fade out initial UI elements
            drawBtn.style.opacity = '0';
            drawBtn.style.pointerEvents = 'none';
            introText.style.opacity = '0';
            
            setTimeout(() => {
                drawBtn.classList.add('hidden');
                interpBtn.classList.remove('hidden');
                
                // Trigger Fade-in for interpretation button
                requestAnimationFrame(() => {
                    interpBtn.classList.add('opacity-100');
                });
            }, 800);
        }

        // Particle background effect
        const canvas = document.createElement('canvas');
        canvas.className = 'fixed inset-0 pointer-events-none z-[2]';
        document.body.appendChild(canvas);
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
                this.opacity = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.fillStyle = `rgba(233, 195, 73, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 80; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
