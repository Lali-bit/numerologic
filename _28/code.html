<script>
        function handleDraw() {
            const card = document.getElementById('active-card');
            const overlay = document.getElementById('success-overlay');
            
            // Animation sequence
            card.style.transform = 'translateY(-100vh) rotate(0deg) scale(1.5)';
            card.style.opacity = '0';
            card.style.transition = 'all 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55)';
            
            setTimeout(() => {
                overlay.classList.remove('pointer-events-none');
                overlay.classList.add('opacity-100');
            }, 600);
        }

        function resetScene() {
            const card = document.getElementById('active-card');
            const overlay = document.getElementById('success-overlay');
            
            overlay.classList.add('pointer-events-none');
            overlay.classList.remove('opacity-100');
            
            setTimeout(() => {
                card.style.transform = '';
                card.style.opacity = '1';
                card.style.transition = 'all 0.8s ease-out';
            }, 300);
        }

        // Particle background effect
        const canvas = document.createElement('canvas');
        canvas.className = 'fixed inset-0 pointer-events-none z-[2]';
        document.body.appendChild(canvas);
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
                this.opacity = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.fillStyle = `rgba(233, 195, 73, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 80; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
